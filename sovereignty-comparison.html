            raw: { CH:"Worldwide — residents taxed on worldwide income and wealth. Exception: private capital gains on movable assets (shares/bonds) are tax-exempt for non-professional investors. Lump-sum taxation available for foreign nationals not engaged in Swiss employment.", SI:"Worldwide — residents taxed on worldwide income. Investment income (capital gains, dividends, interest) taxed at flat rate. EU/OECD standard residence-based system.", EE:"Unique distributed-profit system. Corporate: 0% on retained earnings; 22% on distributed profits (dividends). Individual: 22% flat rate on all personal income including investment income (from 2025). Residents taxed on worldwide income. CFC rules apply to tax haven entities only.", PT:"Worldwide for standard residents. IFICI (NHR 2.0) regime: foreign-sourced income (dividends, interest, capital gains, rental) exempt for 10 years for qualifying new residents from eligible activities. Standard residents: worldwide income at progressive rates 13.25%–48% + solidarity surtax.", NZ:"Worldwide — residents taxed on worldwide income. No general capital gains tax. FIF (Foreign Investment Fund) regime taxes certain foreign share holdings on a deemed 5% annual return basis (Fair Dividend Rate method). Transitional resident exemption: new residents exempt from foreign income for 4 years (not 11 years).", CA:"Worldwide \u2014 all global income taxed", US:"Citizenship-based taxation — US citizens taxed on worldwide income regardless of where they live. Even after becoming tax residents of another country, US citizens must file annual US returns and pay US tax on global income. No territorial exemption for citizens abroad.", UY:"Territorial basis for standard residents — only Uruguayan-source income taxed. New residents: 11-year exemption on foreign-source capital income (dividends, interest, now capital gains) available under specific conditions (Law 20.446 effective 2026). ⚠️ MAJOR 2025/2026 CHANGE: Law 20.446 tightened conditions — oad, foreign investments, overseas business income) is NOT subject to Costa Rican income tax. Domestic income: employment 0%–25% progressive (top 25% at ~USD 4,200/month); self-employed/business 0%–30%. Score 9: territorial system — 0% effective rate on foreign income; slight deduction vs Panama for greater structural complexity and developing-country policy continuity risk.", PA:"Pure territorial system — Panama taxes ONLY Panama-sourced income. All foreign-sourced income (investments, dividends, employment outside Panama, foreign business income) is definitively 0% with no time limit and no special registration requirement beyond residency. Panama-source employment/business income: up to 25% progressive. Score 10: the cleanest and most established territorial regime among the 11 countries — 0% on all foreign income, no time limits, no phase-out.", AR:"Top marginal rate: 35% (on income over ARS 53,153,257 after deductions in 2025, adjusted for inflation). Rates: 5% to 35% progressive. Foreign income included at these rates for residents." },

        blend: { sources: [

            conversionNote: "No div tax \u219210 \u00B7 <15% \u21928 \u00B7 15\u201325% \u21925 \u00B7 25\u201335% \u21923 \u00B7 35%+ \u21921",
            raw: { CH:"Dividends from Swiss companies subject to 35% WHT at source — refundable against income tax liability if declared. Net effective rate on Swiss dividends included with other income and taxed at ordinary cantonal/federal rates (35–43% in Zurich/Geneva for top earners). Foreign dividends: included in ordinary income at cantonal rates.", SI:"Dividends taxed at flat 25% rate (domestic and foreign). 25% is the applicable rate regardless of source.", EE:"Individual level: dividends paid by Estonian company to individual shareholder after company has paid 22% CIT on distributed profits = effectively the corporate tax is the full burden at distribution. No further 22% PIT withholding on dividends from 2025 (7% WHT on dividends abolished). Foreign dividends: exempt if underlying profits were subject to foreign tax OR tax withheld at source.", PT:"Dividends taxed at flat 28% rate (domestic and foreign source). Taxpayer may elect aggregation with progressive rates (up to 53%) if beneficial; 50% inclusion for EU-source dividends if aggregation elected. IFICI/NHR 1.0 holders: foreign dividends exempt.", NZ:"Dividends taxed as ordinary income at marginal rates (up to 39%). Imputation credit system: credits attached to NZ dividends representing corporate tax already paid (28%) — effectively reduces double taxation. Foreign dividends: subject to FIF rules (5% FDR deemed return) OR taxed as ordinary income.", CA:"39\u201354% (eligible div to foreign div; top marginal)", US:"Qualified dividends: 20% federal maximum (same as long-term CGT) + 3.8% NIIT = 23.8%. Non-qualified dividends: ordinary income rates up to 37%. State taxes additional. Federal + CA qualified: ~33–37%.", UY:"Uruguayan-source dividends: 7% IRPF (withheld by paying company). Foreign dividends: 0% during 11-year holiday; 12% IRPF post-holiday or for non-qualifying residents. Under Law 20.446: foreign dividends channeled through non-resident entities now also 12%.", CR:"Dividends from Costa Rican             raw: { CH:"Federal CIT: 8.5% effective (8.5% on pre-tax profit or 7.83% nominal). Cantonal varies significantly: Zug ~11.9%; Zurich ~19.7%; Geneva ~24.2%. Effective combined (federal + cantonal + municipal): Zug ~11.85%; Zurich ~19.7%. Participation exemption: 100% income/CGT exemption on dividend income and capital gains from qualifying participations (≥10% or CHF 1M+ value, held ≥1 year).", SI:"CIT rate: 19% (2025). Participation exemption: 95% exemption on dividends and 47.5% effective exemption on capital gains from qualifying shareholdings (≥8%, held ≥6 months, with substance). No full holdco regime but participation exemption available.", EE:"Unique system: 0% CIT on retained/undistributed profits. 22% CIT only on profit distribution (dividends, deemed distributions). All capital gains, interest, dividends, and passive income accumulated within an Estonian company: 0% tax until distributed.", PT:"Standard CIT rate: 21% (mainland). Madeira International Business Centre (MIBC): 5% (special regime, EU-approved). Participation exemption: full exemption on dividends and capital gains from qualifying participations (≥10%, held ≥12 months). Strong holdco regime.", NZ:"CIT: 28% flat rate. No special holdco regime. Imputation system ensures no double taxation at shareholder level for NZ dividends. Limited participation exemption for foreign dividend income in some circumstances.", CA:"26.5% combined; holdco passive income ~50.17% (ON)", US:"Federal CIT: 21% (TCJA 2017, permanent under OBBBA 2025). Federal + state: California adds 8.84%, New York 7.25%, etc. Combined federal + CA: ~29.84%. No dividend-received deduction for foreign subsidiaries (Subpart F/GILTI applies). GILTI minimum rate: effectively 10.5% on offshore income for US multinationals.", UY:"CIT: 25% on Uruguayan-source income (territorial). Foreign-source income in Uruguayan companies: generally exempt (territorial). IRAE exemptions for certain activity. No formal participation exemption for offshore holdcos but territorial system makes foreign income tax-free at corporate level.", CR:"CIT: 30% for companies with gross income over CRC 119,629,000. Small business rates: 5%–20% progressive. Capital gains: 15%. Foreign source income: exempt (territorial applies to companies as well).", PA:"25% Panama-source; 0% on foreign income; no holdco regime", AR:"CIT: 35% (standard rate, increased from 25–30% under Milei-era reforms — note: was 35% historically, reduced under prior reforms, returned to 35% in practice). Dividend distribution: 7% additional WHT. Gross income tax (provincial): 3–4.5% additional." },

ovable capital). ⚠️ Law 20.446 (2026): foreign capital gains broadly extended — crypto likely included. DGI has not issued specific crypto guidance for individuals.", CR:"No specific crypto legislation. Territorial principle: gains from crypto held/traded offshore = zero Costa Rican tax. If crypto represents a business activity in Costa Rica: subject to general income tax at up to 30%. Capital gains on CR-domiciled entities: 15%.", PA:"0% foreign crypto; CARF-MCAA signed Dec 2025", AR:"Crypto gains: 15% flat tax on gains for residents. Wealth tax (Bienes Personales): crypto holdings declared at year-end; rates 0.5%–1.75% on total personal assets. REIBP special regime (2024): advance payment option for undisclosed assets including crypto. ⚠️ Argentina classified crypto in 2024 amnesty as declarable foreign assets." },

          { key: "pwc", label: "PWC / KPMG Tax Synthesis", weight: 1.0, url: "https://taxsummaries.pwc.com", type: "primary", year: "2025",
            conversionNote: "No tax+no risk \u219210 \u00B7 No tax+risk \u21927 \u00B7 Existing tax \u21923 \u00B7 High rate \u21921",
            raw: { CH:"Active cantonal wealth tax: levied annually on worldwide net wealth of residents (assets minus debts). Rates vary by canton: approx. 0.1%–1%+ depending on asset value and canton. Zurich: effective rate ~0.3–0.5% on CHF 1–5M net wealth. Geneva: similar or slightly higher. Deduction: approximately CHF 82,200 per adult + CHF 41,100 per child (Zurich 2025).", SI:"No net wealth tax. No credible legislative proposal for one in current political environment. Standard EU member with moderate fiscal posture.", EE:"No net wealth tax. No credible legislative proposal. Estonia's liberal economic tradition makes a wealth tax politically implausible. ⚠️ 2025: Defense contribution (corporate and personal) introduced, but this is based on income/profits, not net wealth.", PT:"No general net wealth tax. Stamp duty on residential real estate worth >EUR 600,000 (AIMI — Adicional ao IMI): 0.7%–1.5% annually on taxable value. AIMI is a quasi-wealth tax on real estate holdings only. No broad wealth tax proposals.", NZ:"No wealth tax. No inheritance or estate tax. Labour Party proposed a capital gains/wealth tax under Ardern government (2019/2022 proposals) but abandoned. Current National-led government explicitly opposed to wealth tax. Low political risk in near term.", CA:"No wealth tax; NDP/Liberal political risk (recurring proposals)", US:"No federal wealth tax. Several Warren/Sanders wealth tax proposals in Congress but have never advanced to a vote. No state-level wealth taxes (some have high property taxes). NIIT (3.8%) is sometimes described as a quasi-wealth tax on investment income but is an income tax, not net-worth-based.", UY:"Net Wealth Tax (NWT/Impuesto al Patrimonio): 0.1% annually on net wealth located in Uruguay for residents. Threshold: ~USD 153,000 (assets below exempt). Foreign assets: NOT subject to NWT for individuals. Only Uruguayan-domiciled assets taxed.", CR:"No net wealth tax. A luxury real estate tax (IMTF) applies to residential properties with a cadastral value over CRC 133M (~USD 260K): 0.25%–0.55% annually. Not a general wealth tax.", PA:"No wealth tax; no political risk", AR:"Personal Assets Tax (Impuesto sobre los Bienes Personales — BP): existing wealth tax on worldwide assets for residents. 2024 REFORM (Law 27.743): new REIBP special advance payment regime. For 2023 onwards: unified rates declining from ~1.75% to 0.25% by 2027 on total net assets. Non-residents: taxed on Argentine-sited assets only. Threshold: ~ARS 292M (~USD 330K)." },
            sub: { CH:3, SI:10, EE:10, PT:7, NZ:10, CA:7, US:7, UY:7, CR:10, PA:10, AR:3 } },
        ] } },
      { id: "t8", text: "Inheritance & estate tax", priority: "high",
        rubric: "10 = No estate/inheritance tax \u00B7 7 = Low rates or high thresholds \u00B7 4 = Moderate \u00B7 1 = Punitive",
        src: [{ name: "PWC Worldwide Tax Summaries", url: "https://taxsummaries.pwc.com", type: "primary" }, { name: "KPMG Estate & Gift Tax Survey", url: "https://kpmg.com/xx/en/home/services/tax/tax-tools-and-resources/tax-rates-online.html", type: "primary" }],
        blend: { sources: [
          { key: "pwc", label: "PWC / KPMG Tax Synthesis", weight: 1.0, url: "https://taxsummaries.pwc.com", type: "primary", year: "2025",
            conversionNote: "No tax \u219210 \u00B7 Low/high threshold \u21927 \u00B7 Moderate \u21924 \u00B7 Punitive \u21921",
            raw: { CH:"Federal level: NO inheritance or estate tax. Cantonal level: taxes vary. Most cantons exempt direct line descendants (children) completely. Spouses/civil partners: exempt in most cantons. Non-direct heirs: subject to cantonal inheritance tax (typically 10–40% depending on canton and relationship). Zurich: no inheritance tax at cantonal level for direct descendants. Geneva: 6–54% (progressive, relationship-dependent).", SI:"No inheritance or estate tax at the national level for direct line heirs (spouses, children). Distant relatives or non-family: subject to gift/inheritance tax.", EE:"No inheritance or estate tax. No gift tax for most family transfers. Capital gains: no deemed disposition on death — heirs inherit at the deceased's acquisition cost.", PT:"No inheritance tax for direct heirs (spouses, children, parents): EXEMPT from Stamp Duty. Gifts/inheritances to non-direct heirs: 10% stamp duty (Imposto do Selo). No estate tax in the traditional sense.", NZ:"No inheritance tax, estate tax, or gift duty. New Zealand abolished estate duty in 1992 and gift duty in 2011.", CA:"No estate tax; deemed disposition on death (s.70(5))", US:"Federal estate tax: 40% rate on estates above USD 13.61M (2024) / indexed threshold under OBBBA 2025. OBBBA permanently extended the higher exemption (indexed). Gift tax: lifetime exemption same as estate tax threshold. State-level estate taxes: some states have lower thresholds (Massachusetts: USD 2M).", UY:"No inheritance or estate tax. No gift tax for most family transfers. Assets pass to heirs without Uruguayan tax event.", CR:"No inheritance or estate tax. No gift tax for most family transfers.", PA:"No estate/inheritance/gift tax", AR:"No formal federal inheritance/estate tax. Provinces: some provinces (e.g. Buenos Aires) levy a moderate inheritance tax on estates above certain thresholds (typically 4–18% for non-direct heirs in Buenos Aires province). Direct heirs: generally exempt at provincial level. Buenos Aires province: charges transmisión gratuita de bienes at 1.6–6% for direct heirs above thresholds." },
            sub: { CH:7, SI:10, EE:10, PT:7, NZ:10, CA:7, US:7, UY:10, CR:10, PA:10, AR:7 } },
        ] } },
      { id: "t9", text: "Property transfer duty", priority: "standard",
        rubric: "10 = Under 1% \u00B7 7 = 1\u20133% \u00B7 4 = 3\u20137% \u00B7 1 = Over 7%",
        src: [{ name: "PWC Worldwide Tax Summaries", url: "https://taxsummaries.pwc.com", type: "primary" }, { name: "Deloitte International Tax Source", url: "https://www.dits.deloitte.com", type: "primary" }],
        blend: { sources: [
          { key: "pwc", label: "PWC / KPMG Tax Synthesis", weight: 1.0, url: "https://taxsummaries.pwc.com", type: "primary", year: "2025",
            conversionNote: "<1% \u219210 \u00B7 1\u20133% \u21927 \u00B7 3\u20137% \u21924 \u00B7 7%+ \u21921",
            raw: { CH:"Real estate transfer tax (Handänderungssteuer): cantonal and municipal. Zurich: 0.15% (very low); Berne: 1.8%; Geneva: 3%; Zug: 0%. Federal: no transfer tax. Rates vary 0–3% depending on canton. Securities transfer stamp tax: 0.15% (Swiss-issued) / 0.30% (foreign-issued) on secondary market transactions with Swiss dealers.", SI:"Real estate transfer tax: 2% on market value of real property sold (buyer + seller typically share). No stamp duty on securities transfers.", EE:"Real estate: no transfer tax or stamp duty on property transfers in Estonia. Title registration fees are minimal (state fee for land registry: ~EUR 65–150). No securities transfer tax.", PT:"IMT (Imposto Municipal sobre Transmissões): 0%–8% progressive on residential property purchase value (0% up to EUR 97,064; up to 8% above EUR 1M). IS (Imposto do Selo): 0.8% additional. Effectively: purchase of EUR 500K property: ~3–5% total; purchase above EUR 1M: ~8.8% combined IMT + IS.", NZ:"No stamp duty or property transfer tax in New Zealand. Only minimal conveyancing and registration fees. Real estate agent fees (typically 2–4%) are a transaction cost but not a tax.", CA:"~2.5% ON at $2M+; higher in Toronto/BC (up to 5%+)", US:"Varies by state: New York City: combined ~1.4–3.9% (state + city). Florida: 0.7%. California: ~0.11% (very low). National average: ~0.5–2%. No federal real estate transfer tax.", UY:"ITP (Impuesto de Transmisión de Patrimonios): 2% of cadastral value paid by buyer + 2% by seller = 4% combined, but each party pays 2%. Cadastral value typically below market value. On arms-length market-value basis: buyer pays ~2% effective. For non-arm's-length (inheritance): 3–4%.", CR:"Property transfer tax: 1.5% on declared transaction value. Relatively low and straightforward.", PA:"2% transfer tax (buyer)", AR:"Stamp duty (Impuesto de Sellos): varies by province. Buenos Aires province: 3.6% combined (buyer + seller share). Federal Capital (CABA): ~3.5% total. Additional notary fees. Overall: ~2.5–4% effective rate." },
            sub: { CH:10, SI:7, EE:10, PT:1, NZ:10, CA:1, US:7, UY:7, CR:7, PA:7, AR:4 } },
        ] } },
      { id: "t10", text: "Exit tax", priority: "high",
        rubric: "10 = No exit tax \u00B7 7 = Limited scope \u00B7 3 = Broad deemed disposition \u00B7 1 = Punitive (Canada-like)",
        src: [{ name: "PWC Worldwide Tax Summaries", url: "https://taxsummaries.pwc.com", type: "primary" }, { name: "KPMG Tax Guides", url: "https://kpmg.com/xx/en/home/services/tax/tax-tools-and-resources/tax-rates-online.html", type: "primary" }],
        blend: { sources: [
          { key: "pwc", label: "PWC / KPMG Tax Synthesis", weight: 1.0, url: "https://taxsummaries.pwc.com", type: "primary", year: "2025",
            conversionNote: "No exit \u219210 \u00B7 Limited \u21927 \u00B7 Broad deemed disp \u21923 \u00B7 Punitive \u21921",
            raw: { CH:"No formal exit tax or deemed disposition for most assets. Exception: Swiss corporate exit tax (corporate level) if company transfers assets abroad. For individuals emigrating: no deemed disposition on portfolio securities or Bitcoin. Foreign real estate: not taxed on exit (only Swiss real estate could be relevant, taxed on actual sale).", SI:"Exit tax: Slovenia implemented EU ATAD exit taxation for businesses (since January 1 2020) but NOT generally for individuals. Individual emigration: no general deemed disposition on portfolio assets on departure. Corporate: value of assets transferred out of Slovenia taxed.", EE:"No personal exit tax on departure. Corporate exit tax: if company transfers assets out of Estonia, deemed distribution tax may apply. Individual emigrating with portfolio: no deemed disposition.", PT:"Exit tax on individuals: Portugal introduced an exit tax in 2021 aligned with ATAD. On departure from Portuguese tax residency, unrealised gains on qualifying assets (primarily company stakes/participations) may be subject to exit tax. Standard portfolio securities: currently not subject to exit tax. Repayable in installments over 5 years if moving to EU/EEA.", NZ:"No exit tax or deemed disposition for individuals leaving NZ. Some complex FIF rules may require a final calculation on departure for accumulated deemed FIF income, but no departure tax on unrealised securities gains.", CA:"Full deemed disposition s.128.1(4) on all capital property at departure", US:"Section 877A expatriation tax: applies to 'covered expatriates' (net worth >USD 2M OR average net tax liability >USD 206,000 for 5 years). Mark-to-market deemed disposition on ALL worldwide assets on the day before expatriation. Exit tax rate: capital gains rates (up to 20% + NIIT). Exclusion: first USD 866,000 (2024, indexed) of net gain exempt. Renunciation fee: USD 2,350. Extremely punitive — second only to Canada's departure tax in scope.", UY:"No exit tax. No deemed disposition on departure from Uruguayan tax residency. Clean exit.", CR:"No exit tax. No deemed disposition on departure from Costa Rican tax residency.", PA:"No exit tax; no deemed disposition on departure", AR:"No formal deemed disposition exit tax on emigration for most assets. However: Argentina has residency-based rules that can retroactively attribute income if residency is disputed. Capital controls and BCRA restrictions may effectively trap capital. No s.128.1-style departure tax." },
            sub: { CH:10, SI:7, EE:7, PT:7, NZ:7, CA:1, US:1, UY:10, CR:10, PA:10, AR:7 } },
        ] } },
      { id: "t11", text: "CFC rules", priority: "critical",
        rubric: "10 = No CFC rules \u00B7 7 = Narrow scope \u00B7 4 = Moderate \u00B7 1 = Broad attribution risk",
        src: [{ name: "OECD BEPS Action 3", url: "https://www.oecd.org/en/topics/sub-issues/base-erosion-and-profit-shifting/beps-actions/beps-action-3.html", type: "primary" }, { name: "PWC Worldwide Tax Summaries", url: "https://taxsummaries.pwc.com", type: "primary" }],
        blend: { sources: [
          { key: "pwc", label: "PWC / KPMG Tax Synthesis", weight: 1.0, url: "https://taxsummaries.pwc.com", type: "primary", year: "2025",
            conversionNote: "No CFC \u219210 \u00B7 Narrow \u21927 \u00B7 Moderate \u21924 \u00B7 Broad FAPI \u21921 ⚠️ UY: Law 20.446 (2026) introduces CFC-lite attribution — foreign passive income through non-resident entities attributed to UY residents at 12% IRPF. Score was 10 (no CFC); revised to 7. ⚠️ NZ: FIF regime is separate from CFC rules but creates similar annual attribution.",
            raw: { CH:"Limited and narrow CFC provisions. Switzerland has some anti-abuse rules but no comprehensive CFC legislation comparable to Canada/US. The Swiss system relies primarily on transfer pricing and abuse rules. No FAPI-equivalent attribution of passive income.", SI:"EU ATAD-based CFC rules in force from 2019. Applies to Slovenian companies owning >50% of foreign entities where actual CIT < half Slovenian CIT. Passive income (dividends, interest, IP income, etc.) attributed. Individuals: CFC rules apply to tax haven entities per PIT rules.", EE:"EU ATAD-based CFC rules from 2019. Applicable to entities in 'tax haven' jurisdictions (list-based — not all low-tax jurisdictions). ⚠️ Estonia's approach: CFC rules apply primarily to 'tax haven' company income, not broadly to all offshore structures. Narrower than some EU peers.", PT:"EU ATAD-based CFC rules: comprehensive. Resident companies (and via pass-through to individuals) owning >50% of foreign entities where effective CIT rate < 50% of Portuguese CIT (i.e. <10.5%). Passive income attributed. Individual-level CFC attribution also possible under the PIT rules.", NZ:"CFC rules: New Zealand has a CFC regime, but it was reformed in 2009 to be much more narrow. Exemption: active income from CFCs in countries with 'comparable tax' regimes — exempt. Passive income from CFCs in low-tax countries: attributed. FIF rules (separate regime) tax foreign equity holdings.", CA:"Comprehensive FAPI rules (ITA Part XVI); \u226510% triggers accrual", US:"Most aggressive CFC rules globally. Subpart F: broad attribution of passive income from CFCs. GILTI (Global Intangible Low-Taxed Income): effectively taxes ALL offshore income of US CFCs at minimum rate. Section 951A GILTI inclusion: applies to individual shareholders with CFC ownership. No real exemption for active business income. OBBBA: GILTI deduction reduced — net tax rate on GILTI increases after 2025.", UY:"No CFC rules. No FAPI equivalent. Uruguay has no controlled foreign corporation legislation. A resident individual owning offshore companies pays no Uruguayan tax on undistributed foreign income. ⚠️ Law 20.446 (2026): new transparency rules allocate income from non-resident entities to individual Uruguay-resident beneficial owners (≥5% ownership) for IRPF at 12%. This is a partial CFC-like attribution for passive capital income ONLY.", CR:"No CFC rules for individuals. The 2023 substance reform created a carve-out for multinational groups without substance — but this targets corporate groups, not individual investors holding offshore structures.", PA:"No CFC rules; no FAPI equivalent", AR:"CFC rules: Argentina has anti-deferral rules for passive income from foreign entities in low-tax jurisdictions. Resident individuals owning ≥5% of a foreign entity in a low-tax country: passive income attributed. Argentine rules are broad and compliance-heavy." },
            sub: { CH:7, SI:4, EE:7, PT:4, NZ:7, CA:1, US:1, UY:7, CR:9, PA:10, AR:4 } },
        ] } },
      { id: "t12", text: "Foreign asset reporting", priority: "high",
        rubric: "10 = No reporting \u00B7 7 = Minimal \u00B7 4 = Moderate (T1135-like) \u00B7 1 = Extensive + penalties",
        src: [{ name: "PWC Worldwide Tax Summaries", url: "https://taxsummaries.pwc.com", type: "primary" }, { name: "KPMG Tax Guides", url: "https://kpmg.com/xx/en/home/services/tax/tax-tools-and-resources/tax-tools-and-resources.html", type: "primary" }],
        blend: { sources: [
          { key: "pwc", label: "PWC / KPMG Tax Synthesis", weight: 1.0, url: "https://taxsummaries.pwc.com", type: "primary", year: "2025",
            conversionNote: "No reporting \u219210 \u00B7 Minimal \u21927 \u00B7 Moderate \u21924 \u00B7 Extensive \u21921 ⚠️ UY: Law 20.446 adds beneficial ownership reporting for offshore entities. ⚠️ NZ: FIF annual disclosure can be compliance-heavy.",
            raw: { CH:"No T1135-equivalent. Swiss residents must declare worldwide assets on their cantonal/federal tax return for wealth tax purposes (full net wealth disclosure required annually). This is disclosure for wealth TAX purposes — different from information exchange reporting. Form for foreign assets: declared as part of the standard tax return. No separate punitive foreign asset reporting regime.", SI:"Standard EU-member reporting. Income from foreign sources must be declared. No separate punitive foreign asset report like T1135. CRS participant — financial institutions report to relevant authorities automatically.", EE:"Standard income tax return must include worldwide income. No separate foreign asset report beyond the income return. CRS participant. Investment account holders: additional reporting for the account.", PT:"Foreign income must be declared in Annex J of the annual return. No separate standalone foreign asset report. CRS participant. Standard EU-level reporting.", NZ:"IRD requires disclosure of foreign income and FIF positions on annual tax return. FIF regime creates annual reporting obligation for foreign share holdings. No FBAR-equivalent standalone form but FIF disclosure can be complex.", CA:"T1135 (CAD 100k+) + T1134 (foreign affiliates); heavy penalties", US:"FBAR (FinCEN 114): must file if foreign financial accounts exceed USD 10,000 at any point in the year. Penalties: up to USD 10,000 per violation (non-willful) or 50% of account value (willful). FATCA Form 8938: foreign assets >USD 200,000. IRS Form 5471: foreign company ownership. IRS Form 3520: foreign trusts. Reporting obligations persist even as non-resident citizen.", UY:"No separate foreign asset reporting form for individuals. Income declared in annual IRPF return. ⚠️ Law 20.446 (2026): new transparency regime requires Uruguayan individuals to report beneficial ownership of non-resident entities for IRPF attribution — this creates a new disclosure requirement for offshore structures.", CR:"No significant foreign asset reporting obligation for individuals beyond standard income tax return (where applicable). CRS participant.", PA:"No foreign asset reporting requirements", AR:"AFIP (now ARCA) requires declaration of worldwide assets in annual income tax return AND separate Bienes Personales wealth tax return. Offshore asset disclosure is mandatory. Non-compliance can result in significant penalties. Capital control rules require BCRA registration for foreign asset repatriation." },
            sub: { CH:7, SI:7, EE:7, PT:7, NZ:7, CA:1, US:1, UY:7, CR:10, PA:10, AR:4 } },
        ] } },
      { id: "t13", text: "Withholding tax on Canadian-source income", priority: "high",
        rubric: "10 = Treaty \u226410% WHT on dividends & interest \u00B7 7 = Treaty at 15% (OECD standard) \u00B7 4 = No treaty (25% Part XIII default) \u00B7 1 = Treaty with high or punitive rates",
        src: [{ name: "CRA Tax Treaties List", url: "https://www.canada.ca/en/department-finance/programs/tax-policy/tax-treaties.html", type: "primary" }, { name: "PWC Worldwide Tax Summaries", url: "https://taxsummaries.pwc.com", type: "primary" }],
        blend: { sources: [
          { key: "pwc", label: "PWC / CRA Treaty Analysis", weight: 1.0, url: "https://www.canada.ca/en/department-finance/programs/tax-policy/tax-treaties.html", type: "primary", year: "2025",
            conversionNote: "Treaty \u226410% \u219210 \u00B7 Treaty 15% \u21927 \u00B7 No treaty 25% \u21924 \u00B7 Punitive \u21921",
            raw: { CH:"Canada-Switzerland Treaty in force (1998; automatic exchange protocol 2016). Dividends: 5% WHT (if corp owns ≥10% voting stock) / 15% (other). Interest: 10%. Rental income: no specific reduced rate in treaty — Part XIII 25% applies OR s.216 election available. Trust distributions: 25% Part XIII (no reduced treaty rate for trust income). Section 216 election available for rental income.", SI:"Canada-Slovenia Treaty in force (2002). Dividends: 5% (≥25% voting stock) / 15% (other). Interest: 10%. Rental income: Part XIII 25% (treaty doesn't specifically reduce rental WHT). S.216 election available. Trust distributions: 25%.", EE:"Canada-Estonia Treaty in force (1996). Dividends: 5% (≥10% voting stock) / 15% (other). Interest: 10%. Rental: 25% Part XIII or s.216. Trust: 25%.", PT:"Canada-Portugal Treaty in force (2001). Dividends: 10% (≥25% voting stock) / 15% (other portfolio). Interest: 10%. Rental: 25% Part XIII or s.216. Trust: 25%.", NZ:"Canada-New Zealand Treaty (2012, in force 2015). Dividends: 5% (≥10% voting stock) / 15% (other). Interest: 10%. Rental: 25% Part XIII or s.216. Trust: 25%.", CA:"Reference country", US:"Canada-US Treaty (1980, heavily amended including 2007 Protocol). Dividends: 5% (≥10% voting) / 15% (other). Interest: 0% (arm's-length). Rental: 25% Part XIII or s.216. Trust: complex provisions — generally 25% or treaty reduced rates. S.216 election available.", UY:"No Canada-Uruguay income tax treaty. Default Part XIII WHT applies: dividends 25%, interest 25%, rental income 25%. S.216 election available for rental income (files NR return on net income). Trust distributions: 25%.", CR:"No Canada-Costa Rica income tax treaty. Default Part XIII WHT: 25%. S.216 election available for rentals.", PA:"No treaty; 25% Part XIII; S.216 election available for rentals", AR:"Canada-Argentina Treaty in force (1994). Dividends: 10% (≥25% voting) / 15% (other). Interest: 12.5%. Rental: 25% Part XIII or s.216. Trust: 25%." },
            sub: { CH:7, SI:7, EE:7, PT:7, NZ:7, CA:0, US:7, UY:4, CR:4, PA:4, AR:7 } },
        ] } },
      { id: "t14", text: "CRA information reach & reporting burden", priority: "high",
        rubric: "10 = No treaty + limited automatic exchange \u00B7 7 = No treaty but CRS participant \u00B7 4 = Treaty with on-request info exchange \u00B7 1 = Full AEOI + mutual collection assistance (US/EU-level)",
        src: [{ name: "OECD Global Forum on Transparency", url: "https://www.oecd.org/en/topics/sub-issues/exchange-of-tax-information/global-forum.html", type: "primary" }, { name: "CRA Tax Treaties List", url: "https://www.canada.ca/en/department-finance/programs/tax-policy/tax-treaties.html", type: "primary" }],
        blend: { sources: [
          { key: "pwc", label: "OECD / CRA Treaty Analysis", weight: 1.0, url: "https://www.oecd.org/en/topics/sub-issues/exchange-of-tax-information/global-forum.html", type: "primary", year: "2025",
            conversionNote: "No treaty+no AEOI \u219210 \u00B7 No treaty+CRS \u21927 \u00B7 Treaty+on-request \u21924 \u00B7 Full AEOI \u21921 ⚠️ CH: full bilateral AEOI with Canada since 2017 (score 2, not 1, due to no income tax treaty but full CRS). ⚠️ UY/CR: no tax treaty — CRS automatic exchange applies but no mutual assistance; scored 7.",
            raw: { CH:"Full AEOI since 2017 (CRS automatic exchange — Canada and Switzerland bilateral AEOI via Exchange of Notes, 2016). Full treaty (Article 26 + mutual collection assistance). Swiss banks report Canadian account holders to Swiss FTA, which exchanges data with CRA annually.", SI:"EU member + Canada treaty + AEOI (CRS). Full automatic exchange. EU-level cooperation through DAC also applies. Maximum transparency.", EE:"EU member + Canada treaty + AEOI (CRS). Full automatic exchange. EU DAC. Maximum transparency.", PT:"EU member + Canada treaty + AEOI (CRS). Full automatic exchange. EU DAC. Maximum transparency.", NZ:"Canada treaty (2012) + AEOI (CRS participant since 2017 — New Zealand joined early). Full automatic exchange of financial account information. Mutual collection assistance.", CA:"Reference country (max reach: 90+ treaties + CRS AEOI)", US:"Comprehensive US-Canada treaty with mutual assistance. FATCA IGA with Canada (2014): comprehensive automatic exchange of US-sourced income and financial accounts. Full AEOI + mutual collection + FATCA = maximum CRA access.", UY:"No full income tax treaty (no Canada-Uruguay treaty on CRA list). Uruguay IS a CRS participant (effective from 2017). CRS provides automatic financial account exchange — but without a full treaty, no mutual collection assistance. Canada is on Uruguay's reportable jurisdictions list under CRS.", CR:"No Canada-Costa Rica income tax treaty. Costa Rica IS a CRS participant (committed, with some implementation delays). CRS provides financial account exchange. No mutual collection assistance.", PA:"TIEA (on-request) + CRS AEOI + CARF-MCAA signed Dec 2025", AR:"Canada-Argentina treaty in force (1994) with Article 26 information exchange (on-request). Argentina IS a CRS participant. Combined: full AEOI through CRS + on-request through treaty. No full mutual collection assistance clause (unlike US treaty). Between score 4 and 1." },
            sub: { CH:2, SI:1, EE:1, PT:1, NZ:1, CA:1, US:1, UY:7, CR:7, PA:4, AR:4 } },
        ] } },
    ],
  },

const PRESEEDED_CATS = ['tax', 'residency', 'quality', 'economy', 'ops', 'banking']; // extend as future phases populate more cats

  const storedNotesVer = localStorage.getItem(SK + '_notesVersion');
  const notesVersionCurrent = storedNotesVer === NOTES_VERSION;
  const fresh = buildDefaultNotes();
  const migrated = {};
  COUNTRIES.forEach((co) => {
    const old = storedNotes[co.code];
    if (!old) {
      migrated[co.code] = fresh[co.code];
    } else if (old.cats) {
      // Already new format — merge, with optional force-refresh of pre-seeded cats on version bump
      const mergedCats = {};
      CATEGORIES.forEach((cat) => {
        const oldVal = old.cats[cat.id];
        const freshVal = fresh[co.code].cats[cat.id];
        // Force-refresh pre-seeded cats when notes version is outdated AND fresh has content for this cat
        if (!notesVersionCurrent && PRESEEDED_CATS.includes(cat.id) && freshVal) {
          mergedCats[cat.id] = freshVal;
        } else {
          mergedCats[cat.id] = (oldVal != null) ? oldVal : (freshVal || "");
        }
      });
      mergedCats['_personal'] = (old.cats['_personal'] != null) ? old.cats['_personal'] : "";
      migrated[co.code] = { score: old.score != null ? old.score : 5, cats: mergedCats };
    } else {
      // Old flat format — migrate text to _personal notes; seed all cats from fresh
      const mergedCats = { ...fresh[co.code].cats };
      if (old.text) mergedCats['_personal'] = old.text;
      migrated[co.code] = { score: old.score != null ? old.score : 5, cats: mergedCats };
    }
  });

  localStorage.setItem(SK + '_notesVersion', NOTES_VERSION);

// ─── Small components ───
function ScoreInput({ value, onChange, size = "normal" }) {
  const c = scoreColor(value);
  const w = size === "small" ? 38 : 44;
  const h = size === "small" ? 28 : 32;
  return (<input type="number" min={0} max={10} value={value} onChange={(e) => onChange(Math.min(10, Math.max(0, parseInt(e.target.value) || 0)))} style={{ width: w, height: h, textAlign: "center", border: `1.5px solid ${c.bar}40`, borderRadius: 6, background: c.bg, color: c.text, fontWeight: 700, fontSize: size === "small" ? 12 : 13, fontFamily: F.mono, outline: "none", cursor: "pointer", transition: "all 0.15s" }} />);
}
function WeightInput({ value, onChange }) {
  return (<select value={value} onChange={(e) => onChange(parseInt(e.target.value))} style={{ width: 40, height: 26, textAlign: "center", border: "1px solid #e5e7eb", borderRadius: 6, background: value === 0 ? "#f9fafb" : "#f0f9ff", color: value === 0 ? "#9ca3af" : "#0369a1", fontWeight: 700, fontSize: 11, fontFamily: F.mono, cursor: "pointer", outline: "none" }}>{[0, 1, 2, 3, 4, 5].map((v) => (<option key={v} value={v}>{v}</option>))}</select>);
}
function TierBadge({ tier }) {
  const s = tierStyle[tier];
  return (<span style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.07em", textTransform: "uppercase", padding: "2px 7px", borderRadius: 20, background: s.bg, color: s.color, border: `1px solid ${s.border}`, fontFamily: F.mono, whiteSpace: "nowrap" }}>{tier}</span>);
}
function PriorityDot({ level }) {
  const c = { critical: "#ef4444", high: "#f97316", standard: "#9ca3af" };
  return (<span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: c[level] || c.standard, flexShrink: 0 }} />);
}
function ScoreBar({ value, maxW = 120 }) {
  const c = scoreColor(value);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <div style={{ width: maxW, height: 8, background: "#f3f4f6", borderRadius: 4, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${(value / 10) * 100}%`, background: c.bar, borderRadius: 4, transition: "width 0.3s" }} />
      </div>
      <span style={{ fontSize: 12, fontWeight: 700, color: c.text, fontFamily: F.mono, minWidth: 28 }}>{value.toFixed(1)}</span>
    </div>
  );
}

// ─── Blend Calculation Table ───
function BlendTable({ blend, countries, crId, onScoreChange, savedWts, onBlendWeightChange }) {
  const { useState } = React;
  const CODES = countries.map(c => c.code);

  // Local editable weights — restored from saved state on open, else from blend defaults
  const [localWts, setLocalWts] = useState(() =>
    (savedWts && Object.keys(savedWts).length > 0)
      ? savedWts
      : Object.fromEntries(blend.sources.map(s => [s.key, Math.round(s.weight * 100)]))
  );
  function setWt(key, val) {
    const n = Math.max(0, Math.min(100, parseInt(val) || 0));
    setLocalWts(prev => ({ ...prev, [key]: n }));
    if (onBlendWeightChange) onBlendWeightChange(crId, key, n);
  }
  const wtSum = blend.sources.reduce((a, s) => a + (localWts[s.key] || 0), 0);

  // Compute blended score using current local weights
  function blendedScore(code) {
    if (wtSum === 0) return null;
    let total = 0;
    blend.sources.forEach(src => {
      const sub = src.sub[code];
      if (sub !== undefined) total += sub * (localWts[src.key] || 0);
    });
    return total / wtSum;
  }

  const multiSource = blend.sources.length > 1;
  const COL = `180px repeat(${CODES.length}, minmax(42px, 1fr)) 60px`;
  const MINW = `${180 + CODES.length * 42 + 60}px`;

  const srcTypeStyle = {
    primary:  { bg: "#f0fdf4", color: "#15803d", border: "#86efac" },
    compiled: { bg: "#eff6ff", color: "#1d4ed8", border: "#93c5fd" },
    secondary:{ bg: "#f9fafb", color: "#6b7280", border: "#e5e7eb" },
  };

  return (
    <div style={{ marginBottom: 24 }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#374151", fontFamily: F.mono, letterSpacing: "0.06em", textTransform: "uppercase" }}>
          Score Breakdown
        </div>
        {blend.sources.length > 1 && (
          <div style={{ fontSize: 10, color: "#9ca3af", fontFamily: F.mono }}>
            Edit weights below · blended score updates live
          </div>
        )}
      </div>
      <div style={{ border: "1px solid #e5e7eb", borderRadius: 10, overflowX: "auto", overflowY: "hidden", fontSize: 11.5 }}>

        {/* Header */}
        <div style={{ display: "grid", gridTemplateColumns: COL, minWidth: MINW, background: "#f8fafc", borderBottom: "2px solid #e5e7eb" }}>
          <div style={{ padding: "8px 12px", fontWeight: 700, color: "#374151", fontFamily: F.mono, fontSize: 11 }}>{multiSource ? "Source · Weight" : "Source"}</div>
          {CODES.map(code => {
            const co = countries.find(c => c.code === code);
            return (
              <div key={code} style={{ padding: "8px 4px", fontWeight: 700, color: "#374151", fontFamily: F.mono, textAlign: "center", fontSize: 11 }}>
                <div>{co?.flag || ""}</div>
                <div style={{ fontSize: 9, color: "#9ca3af", marginTop: 1 }}>{code}</div>
              </div>
            );
          })}
          <div style={{ padding: "8px 8px", fontWeight: 700, color: "#374151", fontFamily: F.mono, textAlign: "center", fontSize: 11 }}>Year</div>
        </div>

        {/* Source rows */}
        {blend.sources.map((src, si) => {
          const st = srcTypeStyle[src.type] || srcTypeStyle.secondary;
          const wtPct = localWts[src.key] || 0;
          return (
            <div key={src.key} style={{ display: "grid", gridTemplateColumns: COL, minWidth: MINW, borderBottom: "1px solid #f0f0f0", background: si % 2 === 0 ? "#fff" : "#fafbfc" }}>

              {/* Source label + editable weight */}
              <div style={{ padding: "10px 12px", display: "flex", flexDirection: "column", gap: 4 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontSize: 8, fontWeight: 700, padding: "1px 5px", borderRadius: 10, background: st.bg, color: st.color, border: `1px solid ${st.border}`, fontFamily: F.mono, textTransform: "uppercase", flexShrink: 0 }}>{src.type}</span>
                  {src.url ? (
                    <a href={src.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, fontWeight: 700, color: "#1d4ed8", fontFamily: F.body, textDecoration: "none" }}>{src.label} ↗</a>
                  ) : (
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#374151", fontFamily: F.body }}>{src.label}</span>
                  )}
                </div>
                {src.conversionNote && (
                  <div style={{ fontSize: 9, color: "#9ca3af", fontFamily: F.mono, lineHeight: 1.4 }}>{src.conversionNote}</div>
                )}
                {/* Editable weight — only show when multiple sources */}
                {blend.sources.length > 1 && (
                  <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 2 }}>
                    <span style={{ fontSize: 10, color: "#6b7280", fontFamily: F.mono }}>Weight:</span>
                    <input
                      type="number" min="0" max="100" value={wtPct}
                      onChange={e => setWt(src.key, e.target.value)}
                      style={{ width: 44, padding: "2px 4px", border: "1px solid #d1d5db", borderRadius: 5, fontSize: 11, fontFamily: F.mono, fontWeight: 700, color: "#7c3aed", textAlign: "center", background: "#faf5ff" }}
                    />
                    <span style={{ fontSize: 10, color: "#7c3aed", fontFamily: F.mono }}>%</span>
                    {wtSum !== 100 && <span style={{ fontSize: 9, color: "#ef4444", fontFamily: F.mono }}>(sum={wtSum})</span>}
                  </div>
                )}
              </div>

              {/* Per-country raw + sub-score */}
              {CODES.map(code => {
                const rawVal = src.raw?.[code];
                const subScore = src.sub?.[code];
                const sc = subScore !== undefined ? scoreColor(subScore) : null;
                return (
                  <div key={code} style={{ padding: "8px 4px", textAlign: "center", alignSelf: "center" }}>
                    {rawVal !== undefined ? (
                      <>
                        <div style={{ fontSize: 9.5, color: "#6b7280", fontFamily: F.mono, lineHeight: 1.2, marginBottom: 2 }}>{rawVal}</div>
                        {subScore !== undefined && (
                          <div style={{ fontSize: 12, fontWeight: 700, color: sc?.text, background: sc?.bg, borderRadius: 4, padding: "1px 4px", display: "inline-block", fontFamily: F.mono }}>{subScore}</div>
                        )}
                      </>
                    ) : (
                      <span style={{ color: "#d1d5db", fontFamily: F.mono }}>—</span>
                    )}
                  </div>
                );
              })}
              <div style={{ padding: "8px", textAlign: "center", fontSize: 9.5, color: "#9ca3af", fontFamily: F.mono, alignSelf: "center" }}>{src.year || ""}</div>
            </div>
          );
        })}

        {/* Blended score row */}
        <div style={{ display: "grid", gridTemplateColumns: COL, minWidth: MINW, background: "#f0f9ff", borderTop: "2px solid #bae6fd" }}>
          <div style={{ padding: "10px 12px" }}>
            <div style={{ fontWeight: 800, color: "#0c4a6e", fontFamily: F.mono, fontSize: 11 }}>
              {blend.sources.length > 1 ? "BLENDED SCORE" : "REFERENCE SCORE"}
            </div>
            <div style={{ fontSize: 9, color: "#7cb8d4", fontFamily: F.mono, marginTop: 2 }}>
              {blend.sources.length > 1 ? "weighted average of sub-scores" : "sub-score from source data"}
            </div>
          </div>
          {CODES.map(code => {
            const b = blendedScore(code);
            const sc = b !== null ? scoreColor(b) : null;
            return (
              <div key={code} style={{ padding: "8px 4px", textAlign: "center", alignSelf: "center" }}>
                {sc ? (
                  <div style={{ fontSize: 13, fontWeight: 800, color: sc.text, background: sc.bg, borderRadius: 5, padding: "2px 6px", display: "inline-block", fontFamily: F.mono }}>{b.toFixed(1)}</div>
                ) : <span style={{ color: "#d1d5db" }}>—</span>}
              </div>
            );
          })}
          <div />
        </div>

        {/* Your Score row (editable) */}
        <div style={{ display: "grid", gridTemplateColumns: COL, minWidth: MINW, background: "#fafbff", borderTop: "1px solid #e0e7ff" }}>
          <div style={{ padding: "10px 12px" }}>
            <div style={{ fontWeight: 800, color: "#4338ca", fontFamily: F.mono, fontSize: 11 }}>YOUR SCORE</div>
            <div style={{ fontSize: 9, color: "#a5b4fc", fontFamily: F.mono, marginTop: 2 }}>used in rankings · click to edit</div>
          </div>
          {CODES.map(code => {
            const co = countries.find(c => c.code === code);
            const b = blendedScore(code);
            const diff = b !== null ? (co.score - b) : null;
            return (
              <div key={code} style={{ padding: "6px 4px", textAlign: "center", alignSelf: "center" }}>
                <ScoreInput size="small" value={co.score} onChange={v => onScoreChange(crId, code, v)} />
                {diff !== null && Math.abs(diff) >= 0.5 && (
                  <div style={{ fontSize: 8.5, fontFamily: F.mono, color: diff > 0 ? "#16a34a" : "#dc2626", marginTop: 1 }}>
                    {diff > 0 ? "+" : ""}{diff.toFixed(1)}
                  </div>
                )}
              </div>
            );
          })}
          <div />
        </div>

      </div>
      <div style={{ fontSize: 10, color: "#9ca3af", fontFamily: F.mono, marginTop: 5, fontStyle: "italic" }}>
        Raw value → sub-score (0–10) · weighted blend → reference score · Your Score used in rankings
      </div>
    </div>
  );
}

              </button>

                const avg = categoryAverages[co.code]?.[cat.id] || 0;

        <div style={{ width: 40, flexShrink: 0 }} />

          <div key={co.code} style={{ width: colW, flexShrink: 0, display: "flex", justifyContent: "center", padding: "3px 2px" }}>

          </div>
        ))}
      </div>

      {/* Overall weighted average */}
      <div style={{ display: "flex", alignItems: "center", background: "#111827", minHeight: 44, minWidth: "fit-content", borderTop: "2px solid #111827" }}>
        <div style={{ width: 300, flexShrink: 0, padding: "8px 14px" }}>
          <span style={{ fontSize: 12, fontWeight: 800, color: "#fff", fontFamily: F.heading }}>OVERALL WEIGHTED AVERAGE</span>
        </div>
        {activeCodes.map((co) => {
          let tw = 0, tws = 0;
          CATEGORIES.forEach((cat) => {
            const cw = catWeights[cat.id] || 0;
            let ctw = 0, ctws = 0;
            cat.criteria.forEach((cr) => { const w = weights[cr.id] || 0; const s = scores[cr.id]?.[co.code] || 0; ctw += w; ctws += w * s; });
            const catAvg = ctw > 0 ? ctws / ctw : 0;
            tw += cw; tws += cw * catAvg;
          });
          const pw = catWeights[PERSONAL_ID] || 3;
          const ps = notes[co.code]?.score || 0;
          tw += pw; tws += pw * ps;
          const avg = tw > 0 ? tws / tw : 0;
          const sc = scoreColor(avg);
          return (
            <div key={co.code} style={{ width: colW, flexShrink: 0, display: "flex", justifyContent: "center" }}>
              <span style={{ fontSize: 13, fontWeight: 800, color: sc.bar, fontFamily: F.mono, textShadow: `0 0 8px ${sc.bar}40` }}>{avg.toFixed(1)}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Notes View ───
function NotesView({ notes, onNoteChange, onNoteScoreChange, rankings, categories }) {
  const { useState: useLocalState } = React;
  const [selectedCC, setSelectedCC] = useLocalState(rankings[0]?.code || "CH");
  const [openSections, setOpenSections] = useLocalState(() => {
    const init = { tax: true };
    categories.forEach((cat) => { if (cat.id !== "tax") init[cat.id] = false; });
    init['_personal'] = false;
    return init;
  });

  const toggleSection = (id) => setOpenSections((p) => ({ ...p, [id]: !p[id] }));

  const country = rankings.find((r) => r.code === selectedCC) || rankings[0];
  if (!country) return null;
  const n = notes[selectedCC] || { score: 5, cats: {} };

  const catColors = {
    critical: { bg: "#fef2f2", hdr: "#b91c1c", border: "#fecaca", dot: "#ef4444" },
    high:     { bg: "#fff7ed", hdr: "#c2410c", border: "#fed7aa", dot: "#f97316" },
    standard: { bg: "#f9fafb", hdr: "#4b5563", border: "#e5e7eb", dot: "#9ca3af" },

    ...categories.map((cat) => ({ id: cat.id, icon: cat.icon, title: cat.title, tier: cat.tier })),

              style={{
                display: "block", width: "100%", fontFamily: F.heading, fontSize: 26,
                fontWeight: 800, color: "#111827", background: "transparent",
                border: "none", outline: "none", cursor: "pointer",
                padding: 0, paddingRight: 28, margin: 0, appearance: "none", WebkitAppearance: "none",
                lineHeight: 1.15,
              }}
            >
              {rankings.map((r) => (
                <option key={r.code} value={r.code}>
                  {r.name}  ·  {r.avg.toFixed(2)}

              ))}

            <span style={{ position: "absolute", right: 2, top: "50%", transform: "translateY(-50%)", fontSize: 22, color: "#6b7280", pointerEvents: "none", lineHeight: 1, userSelect: "none" }}>▾</span>
          </div>
          <div style={{ fontSize: 12, color: "#9ca3af", fontFamily: F.mono, marginTop: 5 }}>

        </div>

        {/* Gut feel — right-aligned in the same card */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, flexShrink: 0 }}>
          <span style={{ fontSize: 9, fontWeight: 700, color: "#7c3aed", fontFamily: F.mono, textTransform: "uppercase", letterSpacing: "0.06em" }}>Gut feel</span>
          <ScoreInput value={n.score || 5} onChange={(v) => onNoteScoreChange(selectedCC, v)} />

          <div key={sec.id} style={{ background: "#fff", border: `1px solid ${isOpen ? "#a5b4fc" : "#e5e7eb"}`, borderRadius: 12, overflow: "hidden", transition: "border-color 0.15s" }}>
            {/* Section header */}
            <button onClick={() => toggleSection(sec.id)} style={{
              width: "100%", display: "flex", alignItems: "center", gap: 10,
              padding: "12px 16px", background: isOpen ? "#f5f3ff" : "#fff",
              border: "none", cursor: "pointer", textAlign: "left", transition: "background 0.15s",
            }}>
              <span style={{ fontSize: 15, flexShrink: 0 }}>{sec.icon}</span>
              <span style={{ flex: 1, fontWeight: 700, fontSize: 13, color: isOpen ? "#4338ca" : "#374151", fontFamily: F.heading }}>{sec.title}</span>
              {isPersisted && (
                <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 20, background: c.bg, color: c.hdr, border: `1px solid ${c.border}`, fontFamily: F.mono, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                  notes
                </span>
              )}
              <span style={{ fontSize: 11, color: "#9ca3af", fontFamily: F.mono, transition: "transform 0.15s", transform: isOpen ? "rotate(90deg)" : "rotate(0deg)" }}>{">"}</span>
            </button>
            {/* Section body */}
            {isOpen && (
              <div style={{ padding: "0 16px 14px 16px" }}>
                <textarea
                  value={text}
                  onChange={(e) => onNoteChange(selectedCC, sec.id, e.target.value)}
                  placeholder={sec.id === "_personal" ? `Personal gut-feel observations about ${country.name}...` : `Notes for ${sec.title} — ${country.name}... (pre-seeded from research where available)`}
                  rows={sec.id === "tax" ? 18 : 5}
                  style={{
                    width: "100%", padding: "10px 12px", border: "1px solid #e5e7eb",
                    borderRadius: 8, fontSize: 12.5, fontFamily: F.mono, color: "#1f2937",
                    lineHeight: 1.65, resize: "vertical", outline: "none",
                    background: text.trim() ? "#fafbfc" : "#f9fafb",
                    transition: "border-color 0.15s",
                  }}
                />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
// ─── localStorage persistence helpers ───
const SK = 'sov_v2';
function loadSaved(key, fallback) {
  try { const v = localStorage.getItem(SK + '_' + key); if (v != null) return JSON.parse(v); } catch(e) {}
  return typeof fallback === 'function' ? fallback() : fallback;
}
function saveSaved(key, val) {
  try { localStorage.setItem(SK + '_' + key, JSON.stringify(val)); } catch(e) {}
}

// ═══════════════════════════════════════════════
// ─── Main App ───
// ═══════════════════════════════════════════════
function App() {
  const { useEffect } = React;
  // Priority: SAVED_STATE (baked into HTML) → localStorage → built-in defaults
  const [scores, setScores] = useState(() => {
    if (SAVED_STATE?.scores) return SAVED_STATE.scores;
    const saved = loadSaved('scores', null);
    if (saved) return migrateScoresIfNeeded(saved);
    return buildDefaultScores();
  });
  const [weights, setWeights] = useState(() => SAVED_STATE?.weights || loadSaved('weights', buildDefaultWeights));
  const [catWeights, setCatWeights] = useState(() => SAVED_STATE?.catWeights || loadSaved('catWeights', buildDefaultCatWeights));
  const [notes, setNotes] = useState(() => {
    if (SAVED_STATE?.notes) return SAVED_STATE.notes;
    const savedN = loadSaved('notes', null);
    if (savedN) return migrateNotesIfNeeded(savedN);
    return buildDefaultNotes();
  });
  const [blendWeights, setBlendWeights] = useState(() => SAVED_STATE?.blendWeights || loadSaved('blendWeights', () => ({})));
  const [view, setView] = useState("rankings");
  const [openCats, setOpenCats] = useState(() => new Set(CATEGORIES.map((c) => c.id)));
  const [enabledCountries, setEnabledCountries] = useState(() => new Set((SAVED_STATE?.enabledCountries) || loadSaved('enabledCountries', () => COUNTRIES.map((c) => c.code))));
  const [detailCriterion, setDetailCriterion] = useState(null);
  const [detailCategory, setDetailCategory] = useState(null);
  const [openRankings, setOpenRankings] = useState(() => new Set());

  // Auto-save all persistent state to localStorage on every change
  useEffect(() => saveSaved('scores', scores), [scores]);
  useEffect(() => saveSaved('weights', weights), [weights]);
  useEffect(() => saveSaved('catWeights', catWeights), [catWeights]);
  useEffect(() => saveSaved('notes', notes), [notes]);
  useEffect(() => saveSaved('blendWeights', blendWeights), [blendWeights]);
  useEffect(() => saveSaved('enabledCountries', [...enabledCountries]), [enabledCountries]);

  const onScoreChange = (cid, co, v) => setScores((p) => ({ ...p, [cid]: { ...p[cid], [co]: v } }));
  const onWeightChange = (cid, v) => setWeights((p) => ({ ...p, [cid]: v }));
  const onCatWeightChange = (cid, v) => setCatWeights((p) => ({ ...p, [cid]: v }));
  const onNoteChange = (co, catId, t) => setNotes((p) => ({ ...p, [co]: { ...p[co], cats: { ...(p[co]?.cats || {}), [catId]: t } } }));
  const onNoteScoreChange = (co, v) => setNotes((p) => ({ ...p, [co]: { ...p[co], score: v } }));
  const onBlendWeightChange = (crId, srcKey, pct) => setBlendWeights((p) => ({ ...p, [crId]: { ...(p[crId] || {}), [srcKey]: pct } }));
  const toggleCat = (id) => setOpenCats((p) => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleCountry = (code) => setEnabledCountries((p) => { const n = new Set(p); n.has(code) ? n.delete(code) : n.add(code); return n; });
  const toggleRanking = (code) => setOpenRankings((p) => { const n = new Set(p); n.has(code) ? n.delete(code) : n.add(code); return n; });
  const openDetail = (cr, cat) => { setDetailCriterion(cr); setDetailCategory(cat); };
  const closeDetail = () => { setDetailCriterion(null); setDetailCategory(null); };

  // Category averages (criterion-weighted within each category)
  const categoryAverages = useMemo(() => {
    const r = {};
    COUNTRIES.forEach((co) => { r[co.code] = {};
      CATEGORIES.forEach((cat) => { let tw = 0, tws = 0;
        cat.criteria.forEach((c) => { const w = weights[c.id] || 0; const s = scores[c.id]?.[co.code] || 0; tw += w; tws += w * s; });
        r[co.code][cat.id] = tw > 0 ? tws / tw : 0;
      });
    });
    return r;
  }, [scores, weights]);

  // Overall rankings (category-weighted)
  const rankings = useMemo(() => {
    return COUNTRIES.filter((co) => enabledCountries.has(co.code)).map((co) => {
      let tw = 0, tws = 0;
      CATEGORIES.forEach((cat) => { const cw = catWeights[cat.id] || 0; const avg = categoryAverages[co.code]?.[cat.id] || 0; tw += cw; tws += cw * avg; });
      const pw = catWeights[PERSONAL_ID] || 3; const ps = notes[co.code]?.score || 0; tw += pw; tws += pw * ps;
      return { ...co, avg: tw > 0 ? Math.round((tws / tw) * 100) / 100 : 0 };
    }).sort((a, b) => b.avg - a.avg);
  }, [categoryAverages, catWeights, notes, enabledCountries]);

  const resetAll = () => {
    ['scores','weights','catWeights','notes','blendWeights','enabledCountries'].forEach(k => { try { localStorage.removeItem(SK + '_' + k); } catch(e) {} });
    setScores(buildDefaultScores()); setWeights(buildDefaultWeights()); setCatWeights(buildDefaultCatWeights()); setNotes(buildDefaultNotes()); setBlendWeights({}); setEnabledCountries(new Set(COUNTRIES.map(c => c.code)));
  };

  // ── Option A: Export / Import JSON ──────────────────────────────────────
  const exportState = () => {
    const state = { scores, weights, catWeights, notes, blendWeights, enabledCountries: [...enabledCountries] };
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sovereignty-state-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importState = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const s = JSON.parse(e.target.result);
        if (s.scores) setScores(s.scores);
        if (s.weights) setWeights(s.weights);
        if (s.catWeights) setCatWeights(s.catWeights);
        if (s.notes) setNotes(s.notes);
        if (s.blendWeights) setBlendWeights(s.blendWeights);
        if (s.enabledCountries) setEnabledCountries(new Set(s.enabledCountries));
      } catch(err) { alert('Could not read file. Please use a JSON exported from this tool.'); }
    };
    reader.readAsText(file);
  };

  // ── Option B: Save state baked into the HTML file itself ─────────────────
  const saveToHTML = async () => {
    try {
      const state = { scores, weights, catWeights, notes, blendWeights, enabledCountries: [...enabledCountries] };
      const stateJson = JSON.stringify(state);

      // Read the original script source from the DOM (Babel preserves it)
      const scriptEl = document.querySelector('script[type="text/babel"]');
      const src = scriptEl.textContent;

      // Replace the SAVED_STATE marker with current state
      const markerStart = 'const SAVED_STATE = ';
      const markerEnd = '; // @@STATE_MARKER@@';
      const si = src.indexOf(markerStart);
      const ei = src.indexOf(markerEnd) + markerEnd.length;
      if (si === -1 || ei === -1) { alert('Save marker not found in source. Contact developer.'); return; }
      const updatedSrc = src.slice(0, si) + markerStart + stateJson + markerEnd + src.slice(ei);

      // Reconstruct clean HTML (empty root div + updated script)
      const fullHTML = `<!DOCTYPE html>\n<html lang="en">\n${document.head.outerHTML}\n<body>\n<div id="root"></div>\n<script type="text/babel">${updatedSrc}<\/script>\n</body>\n</html>`;

      if ('showSaveFilePicker' in window) {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'sovereignty-comparison.html',
          types: [{ description: 'HTML file', accept: { 'text/html': ['.html'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(fullHTML);
        await writable.close();
      } else {
        // Fallback for browsers without File System Access API
        const blob = new Blob([fullHTML], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'sovereignty-comparison.html';
        a.click();
        URL.revokeObjectURL(url);
      }
    } catch(err) {
      if (err.name !== 'AbortError') alert('Save failed: ' + err.message);
    }
  };

  const views = [
    { id: "rankings", label: "Rankings", icon: "\u{1F3C6}" },
    { id: "scoring", label: "Scoring Matrix", icon: "\u{1F4DD}" },
    { id: "notes", label: "Notes & Gut Feel", icon: "\u{1F4AD}" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#f8f9fb", fontFamily: F.body, padding: "32px 16px" }}>
      <div style={{ maxWidth: 1100, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: "#9ca3af", marginBottom: 6, fontFamily: F.mono }}>Sovereignty Plan {"\u00B7"} Comparison Tool v2</div>
          <h1 style={{ fontSize: "clamp(26px, 4vw, 38px)", fontWeight: 800, color: "#0f172a", fontFamily: F.heading, lineHeight: 1.15, margin: "0 0 8px" }}>Country Evaluation Matrix</h1>
          <p style={{ color: "#6b7280", fontSize: 14, lineHeight: 1.6, maxWidth: 640, margin: 0 }}>
            Two-tier weighted evaluation: category weights control how much each domain matters overall,
            while criterion weights control relative importance within each category. Click any criterion to audit its data sources and scoring rubric.
          </p>
          <div style={{ display: "flex", gap: 20, marginTop: 14, flexWrap: "wrap", alignItems: "center" }}>
            {[{ val: ALL_CRITERIA.length + 1, label: "Criteria", color: "#111827" }, { val: CATEGORIES.length, label: "Categories", color: "#7c3aed" }, { val: enabledCountries.size, label: "Countries", color: "#0369a1" }].map((s) => (
              <div key={s.label} style={{ display: "flex", alignItems: "baseline", gap: 5 }}>
                <span style={{ fontSize: 20, fontWeight: 800, color: s.color, fontFamily: F.heading }}>{s.val}</span>
                <span style={{ fontSize: 11, color: "#9ca3af", fontFamily: F.mono }}>{s.label}</span>
              </div>
            ))}
            <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              <span style={{ fontSize: 10, color: "#10b981", fontFamily: F.mono, fontWeight: 600, marginRight: 4 }}>✓ Auto-saved</span>
              <button onClick={saveToHTML} style={{ padding: "5px 12px", borderRadius: 8, border: "1.5px solid #6366f1", background: "#eef2ff", color: "#4338ca", fontSize: 12, fontWeight: 700, fontFamily: F.mono, cursor: "pointer" }} title="Bake all scores, weights & notes into the HTML file itself — works in any browser, any path">💾 Save to HTML</button>
              <button onClick={exportState} style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid #d1d5db", background: "#fff", color: "#374151", fontSize: 12, fontWeight: 600, fontFamily: F.mono, cursor: "pointer" }} title="Download all settings as a portable JSON backup file">📤 Export JSON</button>
              <label style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid #d1d5db", background: "#fff", color: "#374151", fontSize: 12, fontWeight: 600, fontFamily: F.mono, cursor: "pointer" }} title="Load settings from a previously exported JSON file">
                📥 Import JSON
                <input type="file" accept=".json" onChange={(e) => importState(e.target.files[0])} style={{ display: "none" }} />
              </label>
              <button onClick={resetAll} style={{ padding: "5px 12px", borderRadius: 8, border: "1px solid #fecaca", background: "#fff", color: "#9ca3af", fontSize: 12, fontWeight: 600, fontFamily: F.mono, cursor: "pointer" }} title="Reset all scores, weights and notes to built-in defaults and clear browser storage">↺ Reset</button>
            </div>
          </div>
        </div>

        {/* Country pills */}
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, padding: "10px 14px", background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb" }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: "#374151", fontFamily: F.mono, textTransform: "uppercase", letterSpacing: "0.06em", alignSelf: "center", marginRight: 4 }}>Countries:</span>
          {COUNTRIES.map((co) => {
            const active = enabledCountries.has(co.code);
            return (<button key={co.code} onClick={() => toggleCountry(co.code)} style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: 20, border: active ? "1.5px solid #111827" : "1px solid #e5e7eb", background: active ? "#111827" : "#fff", color: active ? "#fff" : "#9ca3af", fontSize: 11, fontWeight: 600, fontFamily: F.mono, cursor: "pointer", transition: "all 0.15s" }}><span style={{ fontSize: 13 }}>{co.flag}</span>{co.code}</button>);
          })}
        </div>

        {/* View tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 14, padding: 4, background: "#f3f4f6", borderRadius: 12, width: "fit-content" }}>
          {views.map((v) => (<button key={v.id} onClick={() => setView(v.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 10, border: "none", background: view === v.id ? "#fff" : "transparent", color: view === v.id ? "#111827" : "#6b7280", fontSize: 13, fontWeight: 600, fontFamily: F.body, cursor: "pointer", boxShadow: view === v.id ? "0 1px 4px rgba(0,0,0,0.08)" : "none", transition: "all 0.15s" }}><span>{v.icon}</span>{v.label}</button>))}
        </div>

        {/* Matrix controls */}
        {view === "scoring" && (
          <div style={{ display: "flex", gap: 8, marginBottom: 10, alignItems: "center", flexWrap: "wrap" }}>
            <button onClick={() => setOpenCats(new Set(CATEGORIES.map((c) => c.id)))} style={{ fontSize: 12, color: "#6b7280", background: "none", border: "none", cursor: "pointer", fontFamily: F.mono }}>Expand all</button>
            <span style={{ color: "#d1d5db" }}>{"\u00B7"}</span>
            <button onClick={() => setOpenCats(new Set())} style={{ fontSize: 12, color: "#6b7280", background: "none", border: "none", cursor: "pointer", fontFamily: F.mono }}>Collapse all</button>
            <div style={{ marginLeft: "auto", display: "flex", gap: 12, fontSize: 10, fontFamily: F.mono, color: "#9ca3af" }}>
              <span>CAT = category weight</span>
              <span>SUB = criterion weight</span>
              <span>Score: 0{"\u2013"}10</span>
            </div>
          </div>
        )}

        {/* Views */}
        {view === "rankings" && <RankingsView rankings={rankings} categoryAverages={categoryAverages} catWeights={catWeights} notes={notes} openRankings={openRankings} toggleRanking={toggleRanking} />}
        {view === "scoring" && <ScoringView scores={scores} weights={weights} catWeights={catWeights} notes={notes} onScoreChange={onScoreChange} onWeightChange={onWeightChange} onCatWeightChange={onCatWeightChange} onNoteScoreChange={onNoteScoreChange} openCats={openCats} toggleCat={toggleCat} enabledCountries={enabledCountries} onCriterionClick={openDetail} categoryAverages={categoryAverages} />}
        {view === "notes" && <NotesView notes={notes} rankings={rankings} onNoteChange={onNoteChange} onNoteScoreChange={onNoteScoreChange} categories={CATEGORIES} />}

        {/* Footer */}
        <div style={{ marginTop: 28, padding: "16px 20px", background: "#fff", border: "1px solid #e5e7eb", borderRadius: 12, fontSize: 12, color: "#6b7280", lineHeight: 1.7, fontFamily: F.body }}>
          <div style={{ fontWeight: 700, color: "#374151", marginBottom: 4, fontFamily: F.heading, fontSize: 14 }}>Methodology</div>
          <strong>Two-tier weighting:</strong> Overall = weighted average of category scores, where each category score = weighted average of its criterion scores.{" "}
          <strong>Category weights</strong> (CAT column) control domain importance (default: Critical=5, High=3, Standard=1).{" "}
          <strong>Criterion weights</strong> (SUB column) control relative importance within a category.{" "}
          <strong>Personal subjectivity</strong> is treated as an additional category-level input.{" "}
          <strong>Click any criterion name</strong> to view its scoring rubric, data sources, and per-country scores.
        </div>
      </div>

      {/* Detail panel overlay */}
      {detailCriterion && <CriterionDetailPanel criterion={detailCriterion} category={detailCategory} scores={scores} weights={weights} notes={notes} onScoreChange={onScoreChange} onWeightChange={onWeightChange} onClose={closeDetail} enabledCountries={enabledCountries} blendWeights={blendWeights} onBlendWeightChange={onBlendWeightChange} />}
    </div>
  );
}

// ─── Mount ───
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
